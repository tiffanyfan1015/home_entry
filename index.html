<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tiffanyfan.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 淺粉紅 -> 淺紫 -> 淺藍 的三色夢幻漸層 */
            background: linear-gradient(135deg, #fed6e3 0%, #e0c3fc 50%, #8ec5fc 100%);
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem; /* 縮短與下方 coming soon 的距離 */
            color: #2c3e50;
            text-shadow: none; /* 完全移除陰影 */
        }
        .subtitle {
            font-size: 1.1rem;
            color: #718096; /* 優雅的灰色 */
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 2.5rem; /* 與下方按鈕保持空間 */
        }
        .links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }
        .link-item {
            color: #4a5568;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 0.7rem 1.4rem;
            border-radius: 50px;
            background-color: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        }
        .link-item:hover {
            color: #1a202c;
            border-color: rgba(255, 255, 255, 1);
            background-color: rgba(255, 255, 255, 0.75);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        .github-icon {
            width: 20px;
            height: 20px;
            fill: #4a5568;
            transition: fill 0.3s ease;
        }
        .link-item:hover .github-icon {
            fill: #1a202c;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1rem; }
            .links { flex-direction: column; gap: 1rem; padding: 0 2rem; }
            .link-item { width: 100%; max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>tiffanyfan.com</h1>
        <div class="subtitle">coming soon...</div>
        
        <div class="links">
            <a href="mailto:contact@tiffanyfan.com" class="link-item">📧 Contact</a>
            <a href="https://github.com/tiffanyfan1015" target="_blank" rel="noopener noreferrer" class="link-item">
                <svg class="github-icon" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">

                GitHub
            </a>
        </div>
    </div>

</body>
</html>
